<section class="px-6 py-20 bg-[#0B0A10]">
  <div class="max-w-6xl mx-auto">
    
    <h2 class="mb-10 text-3xl font-bold text-center text-white md:text-4xl">
      Mis Trabajos Recientes
    </h2>

    <div class="flex flex-wrap justify-center gap-2 md:gap-4 mb-12 p-2 bg-[#151320] border border-gray-800 rounded-full w-fit mx-auto">
      <button *ngFor="let cat of categorias" 
              (click)="filtrarCategoria(cat)"
              [ngClass]="categoriaActiva === cat ? 'bg-purple-600 text-white' : 'text-gray-400 hover:text-white'"
              class="px-5 py-2 text-sm font-semibold transition-colors duration-300 rounded-full">
        {{ cat }}
      </button>
    </div>

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <ng-container *ngFor="let proyecto of proyectos">
        
        <div *ngIf="debeMostrarse(proyecto.categoria)" 
             (click)="abrirModal(proyecto)"
             class="flex flex-col bg-[#151320] border border-gray-800 rounded-2xl overflow-hidden cursor-pointer hover:border-purple-500/50 transition-colors group">
          
          <div class="h-48 w-full bg-[#0B0A10] overflow-hidden relative group-hover:opacity-90 transition-opacity">
            <img [src]="proyecto.imagenes[0]" [alt]="proyecto.titulo" class="object-cover w-full h-full">
          </div>

          <div class="p-6 flex flex-col flex-grow">
            <h3 class="text-xl font-bold text-white">{{ proyecto.titulo }}</h3>
            <p class="mt-1 text-sm font-medium text-purple-400">{{ proyecto.empresa }}</p>
            <p class="mt-3 text-sm text-gray-400 flex-grow">{{ proyecto.descripcionCorta }}</p>
            
            <div class="flex flex-wrap gap-2 mt-5">
              <span *ngFor="let tech of proyecto.tecnologias" 
                    class="px-3 py-1 text-xs text-gray-300 bg-[#0B0A10] border border-gray-700 rounded-lg">
                {{ tech }}
              </span>
            </div>
          </div>
        </div>
      </ng-container>
    </div>

  </div>

  <div *ngIf="proyectoSeleccionado" 
       class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
    
    <div class="relative w-full max-w-3xl max-h-[90vh] overflow-y-auto bg-[#151320] border border-gray-700 rounded-2xl shadow-2xl shadow-purple-900/20">
      
      <button (click)="cerrarModal()" 
              class="absolute top-4 right-4 p-2 bg-[#0B0A10] text-gray-400 hover:text-white rounded-full hover:bg-gray-800 transition-colors z-10">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>

      <div class="relative h-64 md:h-96 w-full bg-[#0B0A10] flex items-center justify-center overflow-hidden group">
        
        <!-- La imagen actual -->
        <!-- Usamos un div oscuro de fondo por si la foto no cubre todo (aunque object-cover debería) -->
        <img [src]="proyectoSeleccionado.imagenes[imagenActualIndex]" 
             [alt]="proyectoSeleccionado.titulo" 
             class="object-cover w-full h-full transition-all duration-300">

        <!-- Botón Anterior (Solo se muestra si hay más de 1 foto) -->
        <button *ngIf="proyectoSeleccionado.imagenes.length > 1" 
                (click)="anteriorImagen()" 
                class="absolute left-4 p-2 bg-black/60 text-white rounded-full hover:bg-purple-600 hover:scale-110 transition-all opacity-0 group-hover:opacity-100 backdrop-blur-sm">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>

        <!-- Botón Siguiente (Solo se muestra si hay más de 1 foto) -->
        <button *ngIf="proyectoSeleccionado.imagenes.length > 1" 
                (click)="siguienteImagen()" 
                class="absolute right-4 p-2 bg-black/60 text-white rounded-full hover:bg-purple-600 hover:scale-110 transition-all opacity-0 group-hover:opacity-100 backdrop-blur-sm">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>

        <!-- Puntos indicadores inferiores -->
        <div *ngIf="proyectoSeleccionado.imagenes.length > 1" class="absolute bottom-4 flex gap-2">
          <div *ngFor="let img of proyectoSeleccionado.imagenes; let i = index"
               class="w-2.5 h-2.5 rounded-full transition-all duration-300 shadow-sm"
               [ngClass]="i === imagenActualIndex ? 'bg-purple-500 w-6' : 'bg-white/60'">
          </div>
        </div>

      </div>

      <div class="p-8">
        <div class="flex items-center gap-3 mb-2">
          <span class="px-3 py-1 text-xs text-purple-300 bg-purple-900/30 rounded-full border border-purple-500/20">
            {{ proyectoSeleccionado.categoria }}
          </span>
          <p class="text-sm font-medium text-gray-400">{{ proyectoSeleccionado.empresa }}</p>
        </div>
        
        <h3 class="text-3xl font-bold text-white mb-4">{{ proyectoSeleccionado.titulo }}</h3>
        
        <p class="text-base leading-relaxed text-gray-300 mb-6">
          {{ proyectoSeleccionado.descripcionLarga }}
        </p>

        <div class="flex flex-wrap gap-2 pt-4 border-t border-gray-800">
          <span class="text-sm font-semibold text-white mr-2 flex items-center">Tecnologías usadas:</span>
          <span *ngFor="let tech of proyectoSeleccionado.tecnologias" 
                class="px-3 py-1 text-sm text-gray-300 bg-[#0B0A10] border border-gray-700 rounded-lg">
            {{ tech }}
          </span>
        </div>
      </div>
    </div>
  </div>
</section>
