<section class="px-6 py-20 bg-[#0B0A10]">
  <div class="max-w-4xl mx-auto">
    
    <h2 class="mb-12 text-3xl font-bold text-center text-white md:text-4xl">
      Mis Servicios Técnicos de Calidad
    </h2>

    <div class="flex flex-col gap-4">

      <div *ngFor="let servicio of serviciosList; let i = index"
           class="bg-[#151320] border border-gray-800 rounded-2xl overflow-hidden transition-all duration-300 hover:border-purple-500/50">

        <button (click)="toggleService(i)"
                class="flex items-center justify-between w-full p-5 text-left focus:outline-none md:p-6">
          <div class="pr-4">
            <h3 class="mb-1 text-lg font-semibold text-white md:text-xl">
              {{ servicio.title }}
            </h3>
            <p class="text-sm text-gray-400">
              {{ servicio.subtitle }}
            </p>
          </div>

          <div class="flex-shrink-0 transition-transform duration-300"
               [ngClass]="{'rotate-180': servicio.isOpen}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-400">
              <path d="m6 9 6 6 6-6"/>
            </svg>
          </div>
        </button>

        <div class="overflow-hidden transition-all duration-300 ease-in-out"
             [ngStyle]="{'max-height': servicio.isOpen ? '500px' : '0px', 'opacity': servicio.isOpen ? '1' : '0'}">
          <div class="p-5 pt-0 mt-2 text-sm text-gray-400 border-t md:text-base md:p-6 border-gray-800/50">
            {{ servicio.content }}
          </div>
        </div>

      </div>

    </div>
  </div>
</section>
