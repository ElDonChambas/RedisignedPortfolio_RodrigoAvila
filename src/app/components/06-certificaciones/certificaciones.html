<section class="px-6 py-20 bg-[#0B0A10]">
  <div class="max-w-4xl mx-auto">
    
    <h2 class="mb-12 text-3xl font-bold text-center text-white md:text-4xl">
      Certificaciones y Diplomas Verificados
    </h2>

    <a [href]="enlaceDrive" target="_blank" rel="noopener noreferrer"
       class="flex flex-col md:flex-row items-center gap-6 md:gap-10 p-8 transition-all duration-300 border bg-gradient-to-r from-[#151320] to-[#1c1630] border-purple-900/30 rounded-3xl hover:-translate-y-1 hover:border-purple-500/50 hover:shadow-[0_0_30px_rgba(168,85,247,0.15)] group cursor-pointer">

      <div class="flex-shrink-0 w-36 h-36 md:w-40 md:h-40 bg-white p-2.5 rounded-2xl shadow-lg group-hover:shadow-purple-500/20 transition-shadow">
         <img src="qr.png" alt="Código QR de Certificaciones" class="object-cover w-full h-full rounded-xl">
      </div>

      <div class="text-center md:text-left">
        <h3 class="mb-3 text-xl font-bold text-white md:text-2xl group-hover:text-purple-300 transition-colors">
          Escanear para ver diplomas o hacer clic directamente.
        </h3>
        <p class="text-sm leading-relaxed text-gray-400 md:text-base">
          Accede a mi repositorio seguro de credenciales académicas y documentos de certificaciones profesionales, e-commerce, back-end, bases de datos y metodologías ágiles.
        </p>
      </div>

    </a>

  </div>
</section>
