<section class="px-6 py-20 bg-[#0B0A10]">
  <div class="max-w-6xl mx-auto">
    
    <h2 class="mb-16 text-3xl font-bold text-center text-white md:text-4xl">
      Mi Experiencia Laboral y Formación Académica
    </h2>

    <!-- Contenedor Principal: 1 Columna en Móvil, 2 en Escritorio -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16">
      
      <!-- COLUMNA IZQUIERDA: EXPERIENCIA LABORAL -->
      <div class="flex flex-col gap-10">
        
        <!-- Bloque 1: Remunerados -->
        <div>
          <h3 class="text-xl font-semibold text-gray-300 mb-8 border-b border-gray-800 pb-2">
            Trabajos Remunerados
          </h3>
          
          <!-- Línea de tiempo -->
          <div class="relative border-l-2 border-purple-900/40 ml-3 space-y-6">
            
            <!-- Tarjeta -->
            <div *ngFor="let exp of trabajosRemunerados" class="relative pl-8">
              <!-- Punto de la línea de tiempo -->
              <span class="absolute -left-[7px] top-5 w-3 h-3 rounded-full bg-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.8)]"></span>
              
              <!-- Contenedor Expandible -->
              <div class="bg-[#151320] border border-gray-800 rounded-xl overflow-hidden transition-colors hover:border-purple-500/50">
                <!-- Cabecera clickeable -->
                <button (click)="toggleItem(exp)" class="w-full text-left p-5 focus:outline-none flex justify-between items-start">
                  <div>
                    <h4 class="text-lg font-bold text-white">{{ exp.titulo }}</h4>
                    <p class="text-sm text-gray-400 mt-1">{{ exp.lugar }}</p>
                    <p class="text-xs font-mono text-purple-400 mt-2">{{ exp.fecha }}</p>
                  </div>
                  <!-- Icono indicador de expansión -->
                  <div class="mt-1 text-purple-500 transition-transform duration-300" [ngClass]="{'rotate-180': exp.isOpen}">
                     <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                  </div>
                </button>
                
                <!-- Detalles ocultos -->
                <div class="overflow-hidden transition-all duration-300 ease-in-out"
                     [ngStyle]="{'max-height': exp.isOpen ? '300px' : '0px', 'opacity': exp.isOpen ? '1' : '0'}">
                  <div class="p-5 pt-0 mt-2 text-sm text-gray-400 border-t border-gray-800/50 leading-relaxed">
                    {{ exp.descripcion }}
                  </div>
                </div>
              </div>
            </div>
            
          </div>
        </div>

        <!-- Bloque 2: Otras Experiencias -->
        <div>
          <h3 class="text-xl font-semibold text-gray-300 mb-8 border-b border-gray-800 pb-2">
            Otras Experiencias
          </h3>
          
          <div class="relative border-l-2 border-purple-900/40 ml-3 space-y-6">
            <div *ngFor="let exp of otrasExperiencias" class="relative pl-8">
              <span class="absolute -left-[7px] top-5 w-3 h-3 rounded-full bg-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.8)]"></span>
              
              <div class="bg-[#151320] border border-gray-800 rounded-xl overflow-hidden transition-colors hover:border-purple-500/50">
                <button (click)="toggleItem(exp)" class="w-full text-left p-5 focus:outline-none flex justify-between items-start">
                  <div>
                    <h4 class="text-lg font-bold text-white">{{ exp.titulo }}</h4>
                    <p class="text-sm text-gray-400 mt-1">{{ exp.lugar }}</p>
                    <p class="text-xs font-mono text-purple-400 mt-2">{{ exp.fecha }}</p>
                  </div>
                  <div class="mt-1 text-purple-500 transition-transform duration-300" [ngClass]="{'rotate-180': exp.isOpen}">
                     <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                  </div>
                </button>
                <div class="overflow-hidden transition-all duration-300 ease-in-out"
                     [ngStyle]="{'max-height': exp.isOpen ? '300px' : '0px', 'opacity': exp.isOpen ? '1' : '0'}">
                  <div class="p-5 pt-0 mt-2 text-sm text-gray-400 border-t border-gray-800/50 leading-relaxed">
                    {{ exp.descripcion }}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- COLUMNA DERECHA: FORMACIÓN ACADÉMICA -->
      <div class="flex flex-col">
        <h3 class="text-xl font-semibold text-gray-300 mb-8 border-b border-gray-800 pb-2">
          Formación Académica
        </h3>
        
        <div class="relative border-l-2 border-purple-900/40 ml-3 space-y-6">
          <div *ngFor="let edu of formacionAcademica" class="relative pl-8">
            <span class="absolute -left-[7px] top-5 w-3 h-3 rounded-full bg-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.8)]"></span>
            
            <div class="bg-[#151320] border border-gray-800 rounded-xl overflow-hidden transition-colors hover:border-purple-500/50">
              <button (click)="toggleItem(edu)" class="w-full text-left p-5 focus:outline-none flex justify-between items-start">
                <div>
                  <h4 class="text-lg font-bold text-white">{{ edu.titulo }}</h4>
                  <p class="text-sm text-gray-400 mt-1">{{ edu.lugar }}</p>
                  <p class="text-xs font-mono text-purple-400 mt-2">{{ edu.fecha }}</p>
                </div>
                <div class="mt-1 text-purple-500 transition-transform duration-300" [ngClass]="{'rotate-180': edu.isOpen}">
                   <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                </div>
              </button>
              <div class="overflow-hidden transition-all duration-300 ease-in-out"
                   [ngStyle]="{'max-height': edu.isOpen ? '300px' : '0px', 'opacity': edu.isOpen ? '1' : '0'}">
                <div class="p-5 pt-0 mt-2 text-sm text-gray-400 border-t border-gray-800/50 leading-relaxed">
                  {{ edu.descripcion }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
